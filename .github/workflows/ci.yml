name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # 注意：只安装测试实际触达的依赖。
      # 数据/信号层骨架目前仅依赖 pydantic；openbb/web3/binance 等重依赖
      # 在 Python 3.14 上 wheel 尚不完整，且当前测试不导入它们。
      # 待 collectors 真正用到这些库时，再改为 `pip install -e ".[dev]"`。
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pydantic>=2.10,<3" pytest pytest-asyncio pytest-cov
          pip install -e . --no-deps

      - name: Run tests
        run: pytest --cov=polymarket_quant --cov-report=term-missing
